pc_notify_toast:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
    accept: "application/json"
    content_type: "application/json; charset=utf-8"
  payload: >
    {
      "message": "{{ message }}",
      "title": "{{ title | default('Notification') }}",
      "useToast": true
    }

mqttagent_notify:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
    content_type: "application/json"
  payload: >
    {{ payload | to_json }}

mqttagent_screenshot:
  url: "http://192.168.2.50:23482/api/screenshot"
  method: GET
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"

mqttagent_toggle_block:
  url: "http://192.168.2.50:23482/api/toggle-block"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"enabled": {{ enabled | lower }}}'

mqttagent_toggle_force:
  url: "http://192.168.2.50:23482/api/toggle-force"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"enabled": {{ enabled | lower }}}'

mqttagent_execute:
  url: "http://192.168.2.50:23482/api/execute"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"action": {{ action_json | to_json }}}'

mqttagent_lock:
  url: "http://192.168.2.50:23482/api/execute"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"action": "{\"action\": \"lock\"}"}'

mqttagent_shutdown:
  url: "http://192.168.2.50:23482/api/execute"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"action": "{\"action\": \"shutdown\"}"}'

mqttagent_start_process:
  url: "http://192.168.2.50:23482/api/start-process"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: >
    {
      "executable": "{{ exe }}",
      "arguments": "{{ args | default('') }}",
      "elevated": {{ elevated | default(false) | lower }},
      "waitForExit": {{ wait | default(false) | lower }}
    }

mqttagent_device_enable:
  url: "http://192.168.2.50:23482/api/device-enable"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"pattern": "{{ pattern }}"}'

mqttagent_device_disable:

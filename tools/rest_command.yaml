pc_notify_toast:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
    accept: "application/json"
    content_type: "application/json; charset=utf-8"
  payload: >
    {
      "message": "{{ message }}",
      "title": "{{ title | default('Notification') }}",
      "toast": true
    }

blu_pc_notify:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: >
    {{ payload | to_json }}

blu_pc_screenshot:
  url: "http://192.168.2.50:23482/api/screenshot"
  method: GET
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"

blu_pc_toggle_block:

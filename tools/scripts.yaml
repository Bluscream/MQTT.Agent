notify:
  alias: Notify
  description: A unified wrapper for all notification services and entities in Home
    Assistant.
  fields:
    via_notification:
      name: Send via Notification
      description: Deliver as a non-intrusive notification (used by PC/MQTT/Tablet).
      default: true
      selector:
        boolean: {}
    via_dialog:
      name: Send via Dialog
      description: Deliver as a high-visibility modal window or foreground popup (used
        by PC).
      default: false
      selector:
        boolean: {}
    via_toast:
      name: Send via Toast
      description: Currently reserved for specific technical toasts (unused).
      default: false
      selector:
        boolean: {}
    persistent:
      name: Persistent / Sticky Notification
      description: Deliver as a non-dismissible or sticky notification (used by HA/Mobile).
      default: false
      selector:
        boolean: {}
    message:
      name: Message
      description: The main body text of the notification.
      required: true
      selector:
        text:
          multiline: true
    title:
      name: Title
      description: The title of the notification window or tray message.
      default: Home Assistant
      selector:
        text: {}
    severity:
      name: Target / Scope
      description: Which group of people/devices should receive this notification.
      default: blu
      selector:
        select:
          options:
          - all
          - hass
          - custom
          - blu
          - doris
          - betty
          - katze
    callback:
      name: Callback URL / Click URL
      description: URL to be called when the notification is closed/clicked (used
        by PC/ntfy).
      selector:
        text:
          type: url
    tag:
      name: Tag
      description: A tag for managing/replacing notifications (used by Mobile/ntfy/PC).
      selector:
        text: {}
    icon:
      name: Icon
      description: Icon to display (used by PC/ntfy/Mobile).
      selector:
        text: {}
    priority:
      name: Priority
      description: Priority level (used by Mobile/ntfy).
      default: default
      selector:
        select:
          options:
          - min
          - low
          - default
          - high
          - max
    timeout:
      name: Lifecycle Timeout
      description: Auto-close after X milliseconds (used by PC/Browser).
      default: 0
      selector:
        number:
          min: 0
          max: 3600000
          mode: box
          unit_of_measurement: ms
    entities:
      name: Custom Entities
      description: List of any entities to notify (used by Custom scope).
      selector:
        entity:
          multiple: true
    heading:
      name: Heading
      description: A bold heading displayed at the top (used by Dialogs/PC).
      selector:
        text: {}
    footer:
      name: Footer
      description: Small text displayed at the bottom (used by Dialogs/PC).
      selector:
        text: {}
    details:
      name: Details
      description: Expanded information (used by Dialogs/PC).
      selector:
        text:
          multiline: true
    checkbox:
      name: Checkbox Text
      description: Label for a checkbox (used by Dialogs/PC).
      selector:
        text: {}
    flash:
      name: Flash Taskbar
      description: Whether to flash the taskbar icon (used by PC).
      default: true
      selector:
        boolean: {}
    classic:
      name: Classic Mode
      description: Use the old-school Windows 95 style MessageBox (used by PC).
      default: false
      selector:
        boolean: {}
    ding:
      name: Play Sound
      description: Whether to play a notification sound (used by PC).
      default: true
      selector:
        boolean: {}
    clickAction:
      name: Click Action
      description: URL or navigation path for notification click (used by Mobile).
      selector:
        text: {}
    actions:
      name: Actions
      description: List of actions for interactive notifications (used by Mobile/ntfy).
      selector:
        object: {}
    channel:
      name: Notification Channel
      description: Android notification channel name (used by Android).
      selector:
        text: {}
    markdown:
      name: Markdown Support
      description: Use markdown formatting (used by ntfy).
      default: false
      selector:
        boolean: {}
    attach:
      name: Attachment URL
      description: URL of a file to attach (used by ntfy).
      selector:
        text:
          type: url
    filename:
      name: Attachment Filename
      description: Custom name for the attached file (used by ntfy).
      selector:
        text: {}
    email:
      name: Forward to Email
      description: Email address to forward the notification to (used by ntfy).
      selector:
        text: {}
    sequence_id:
      name: Sequence ID
      description: ID to group or replace specific notification sequences (used by
        ntfy).
      selector:
        text: {}
    via_browser_mod_toast:
      selector:
        boolean: {}
      name: Browser Mod Toast
  sequence:
  - parallel:
    - if:
      - condition: template
        value_template: '{{ persistent | default(false) or severity in [''all'', ''hass'']
          }}'
      then:
      - action: notify.persistent_notification
        data:
          message: '{{ message }}'
          title: '{{ title }}'
    - if:
      - condition: template
        value_template: '{{ severity in [''blu'', ''all''] }}'
      then:
      - parallel:
        - action: script.blu_pc_notify
          data: "{%- set blu_data = {\n  'message': message,\n  'title': title,\n
            \ 'icon': icon | default('info'),\n  'timeout': timeout | default(0),\n
            \ 'flash': flash | default(true),\n  'ding': ding | default(true),\n  'via_notification':
            via_notification | default(true),\n  'via_dialog': via_dialog | default(false),\n
            \ 'classic': classic | default(false)\n} -%} {{ blu_data }}"
          continue_on_error: true
        - action: notify.mobile_app_blu_tablet
          data:
            message: '{{ message }}'
            title: '{{ title }}'
          continue_on_error: true
        - action: notify.send_message
          target:
            entity_id:
            - notify.blu_tablet
          data:
            message: '{{ message }}'
            title: '{{ title }}'
          continue_on_error: true
        - action: rest_command.game_chat_notify
          continue_on_error: true
          data:
            message: '{{ message }}'
            title: '{{ title }}'
          enabled: false
        - action: rest_command.game_hud_notify
          continue_on_error: true
          data:
            message: '{{ message }}'
            title: '{{ title }}'
          enabled: false
        - action: ntfy.publish
          data: "{% set ntfy_peratry = \"3\" %} {% if priority == 'max' %}{% set ntfy_peratry
            = \"5\" %}{% elif priority == 'high' %}{% set ntfy_peratry = \"4\" %}{%
            elif priority == 'low' %}{% set ntfy_peratry = \"2\" %}{% elif priority
            == 'min' %}{% set ntfy_peratry = \"1\" %}{% endif %} {% set ntfy_data
            = {\n  'message': message,\n  'title': title,\n  'priority': ntfy_peratry\n}
            %} {% if callback and callback.startswith('http') %}{% set _ = ntfy_data.update({'click':
            callback}) %}{% endif %} {% if tag %}{% set _ = ntfy_data.update({'tags':
            tag}) %}{% endif %} {% if markdown %}{% set _ = ntfy_data.update({'markdown':
            true}) %}{% endif %} {% if attach %}{% set _ = ntfy_data.update({'attach':
            attach}) %}{% endif %} {% if filename %}{% set _ = ntfy_data.update({'filename':
            filename}) %}{% endif %} {% if email %}{% set _ = ntfy_data.update({'email':
            email}) %}{% endif %} {% if sequence_id %}{% set _ = ntfy_data.update({'sequence_id':
            sequence_id}) %}{% endif %} {% if actions %}{% set _ = ntfy_data.update({'actions':
            actions}) %}{% endif %} {% if icon is defined and icon.startswith('http')
            %}{% set _ = ntfy_data.update({'icon': icon}) %}{% endif %} {{ ntfy_data
            }}\n"
          target:
            entity_id: notify.blu_tablet
          continue_on_error: true
        - action: mqtt.publish
          data:
            topic: cmnd/mqtt_notify_blu_pc/notify
            payload: "{\n  \"message\": \"{{ message }}\",\n  \"title\": \"{{ title
              }}\",\n  \"heading\": \"{{ heading }}\",\n  \"footer\": \"{{ footer
              }}\",\n  \"toast\": {{ via_notification | lower }}\n}\n"
          continue_on_error: true
        continue_on_error: true
    - if:
      - condition: template
        value_template: '{{ severity in [''doris'', ''all''] }}'
      then:
      - action: notify.send_message
        target:
          entity_id: notify.doris_notify_devices
        data:
          message: '{{ message }}'
          title: '{{ title }}'
    - if:
      - condition: template
        value_template: '{{ severity in [''betty'', ''all''] }}'
      then:
      - action: notify.send_message
        target:
          entity_id: notify.betty_notify_devices
        data:
          message: '{{ message }}'
          title: '{{ title }}'
    - if:
      - condition: template
        value_template: '{{ severity in [''katze'', ''all''] }}'
      then:
      - action: notify.send_message
        target:
          entity_id: notify.katze_notify_devices
        data:
          message: '{{ message }}'
          title: '{{ title }}'
    - if:
      - condition: template
        value_template: '{{ severity == ''custom'' }}'
      then:
      - repeat:
          for_each: '{{ entities }}'
          sequence:
          - parallel:
            - if:
              - condition: template
                value_template: '{{ repeat.item.split(''.'')[0] == ''notify'' }}'
              then:
              - action: notify.send_message
                target:
                  entity_id: '{{ repeat.item }}'
                data:
                  message: '{{ message }}'
                  title: '{{ title }}'
            - if:
              - condition: template
                value_template: '{{ repeat.item.split(''.'')[0] == ''script'' }}'
              then:
              - action: '{{ repeat.item }}'
                data: "{%- set custom_data = {\n  'message': message,\n  'title':
                  title,\n  'via_notification': via_notification | default(true),\n
                  \ 'via_dialog': via_dialog | default(false),\n  'classic': classic
                  | default(false)\n} -%} {%- if via_dialog | default(false) -%}\n
                  \ {%- if heading is defined -%}{%- set _ = custom_data.update({'heading':
                  heading}) -%}{%- endif -%}\n  {%- if footer is defined -%}{%- set
                  _ = custom_data.update({'footer': footer}) -%}{%- endif -%}\n  {%-
                  if details is defined -%}{%- set _ = custom_data.update({'details':
                  details}) -%}{%- endif -%}\n  {%- if callback is defined -%}{%-
                  set _ = custom_data.update({'callback': callback}) -%}{%- endif
                  -%}\n{%- endif -%} {{ custom_data }}"
            - if:
              - condition: template
                value_template: '{{ repeat.item.split(''.'')[0] not in [''notify'',
                  ''script''] }}'
              then:
              - action: '{{ repeat.item }}'
                data:
                  message: '{{ message }}'
                  title: '{{ title }}'
    - if:
      - condition: template
        value_template: '{{ severity in [''all'', ''hass''] and via_browser_mod_toast
          }}'
      then:
      - action: browser_mod.notification
        data:
          message: '{{ message }}'
          duration: '{{ timeout }}'
  mode: queued
  max: 10
ttt:
  fields:
    left_color:
      selector:
        color_rgb: {}
      default:
      - 255
      - 0
      - 0
      required: true
    right_color:
      selector:
        color_rgb: {}
      default:
      - 255
      - 0
      - 0
      required: true
    brightness:
      selector:
        number:
          min: 1
          max: 100
      default: 100
      required: true
    interval:
      selector:
        number:
          min: 250
          max: 999999
          step: 250
      default: 1000
      name: Interval
      required: true
  sequence:
  - repeat:
      count: 9999
      sequence:
      - parallel:
        - action: light.turn_on
          metadata: {}
          target:
            entity_id:
            - light.bathroom_mirror_left
          data:
            transition: '{{ interval/1000 }}'
            rgb_color: '{{ left_color }}'
            brightness_pct: '{{ brightness }}'
        - action: light.turn_off
          metadata: {}
          data:
            transition: '{{ interval/1000 }}'
          target:
            entity_id: light.bathroom_mirror_left
      - delay:
          hours: 0
          minutes: 0
          seconds: '{{ interval/1000 }}'
          milliseconds: 0
      - parallel:
        - action: light.turn_on
          metadata: {}
          data:
            transition: 1
            rgb_color: '{{ right_color }}'
            brightness_pct: '{{ brightness }}'
          target:
            entity_id: light.bathroom_mirror_right
        - action: light.turn_off
          metadata: {}
          target:
            entity_id: light.bathroom_mirror_right
          data:
            transition: 1
      - delay:
          hours: 0
          minutes: 0
          seconds: '{{ interval/1000 }}'
          milliseconds: 0
  alias: _ttt
  description: ''
restart_gpu_3_times:
  alias: Restart GPU 3 Times
  sequence:
  - repeat:
      count: 3
      sequence:
      - data:
          title: GPU Maintenance
          message: Restarting GPU (Cycle {{ repeat.index }}/3)...
        action: rest_command.pc_notify_toast
        enabled: false
      - data:
          pattern: AMD Radeon RX 9070 XT
        action: rest_command.mqttagent_device_restart
      - delay:
          seconds: 10
  - data:
      title: GPU Maintenance
      message: GPU Restart cycle complete.
    action: rest_command.pc_notify_toast
    enabled: false
  mode: single
  icon: mdi:gpu
  description: ''
blu_pc_hard_reboot:
  sequence:
  - action: button.press
    metadata: {}
    target:
      entity_id: button.esphome_nas_pc_kvm_power_button_hold
    data: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 10
      milliseconds: 0
  - action: script.blu_pc_start
    metadata: {}
    data:
      use_wol: true
      press_power_button: true
      login_user: bluscream
  alias: Blu-PC Hard Reboot
  description: ''
  fields: {}
  mode: restart

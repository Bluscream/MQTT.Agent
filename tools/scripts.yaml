automater_x728_siren:
  alias: Automater X728 Siren
  description: 'Pulses switch.automater_x728_buzzer in a siren rhythm (500 ms on/off
    ×3, then 1.5 s off) until the script is turned off.

    '
  icon: mdi:alarm-bell
  mode: restart
  sequence:
  - variables:
      script_entity: '{{ this.entity_id }}'
  - repeat:
      while:
      - condition: template
        value_template: '{{ is_state(script_entity, ''on'') }}'
      sequence:
      - repeat:
          count: 2
          sequence:
          - target:
              entity_id: switch.automater_x728_buzzer
            action: switch.turn_on
          - delay: '00:00:00.500'
          - target:
              entity_id: switch.automater_x728_buzzer
            action: switch.turn_off
          - delay: '00:00:00.500'
      - target:
          entity_id: switch.automater_x728_buzzer
        action: switch.turn_on
      - delay: '00:00:00.500'
      - target:
          entity_id: switch.automater_x728_buzzer
        action: switch.turn_off
      - delay: '00:00:01.500'
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id: switch.automater_x728_buzzer
    data: {}
blu_pc_notify:
  alias: 'Blu-PC: Configurable Notify'
  description: Sends a configurable notification to Blu-PC using msgbox.exe
  fields:
    title:
      name: Window Title
      description: The title of the notification window.
      default: Blu-PC Notify
      selector:
        text: {}
    message:
      name: Message
      description: The main body text of the notification.
      default: Alert from Home Assistant
      selector:
        text: {}
    heading:
      name: Heading
      description: A bold heading displayed at the top.
      selector:
        text: {}
    footer:
      name: Footer
      description: Small text displayed at the bottom.
      selector:
        text: {}
    details:
      name: Details
      description: Expanded information shown when clicking the details button.
      selector:
        text: {}
    checkbox:
      name: Checkbox Text
      description: If provided, a checkbox with this label will be shown.
      selector:
        text: {}
    callback:
      name: Callback URL
      description: URL to be called when the notification is closed/clicked.
      selector:
        text: {}
    type:
      name: Button Type
      description: Standard Windows button combinations.
      default: ok
      selector:
        select:
          options:
          - ok
          - okcancel
          - yesno
          - yesnocancel
          - retrycancel
    icon:
      name: Icon
      description: The icon to display.
      default: info
      selector:
        select:
          options:
          - info
          - warning
          - error
          - shield
    timeout:
      name: Timeout
      description: Auto-close after X milliseconds (0 for no timeout).
      default: 0
      selector:
        number:
          min: 0
          max: 3600000
          mode: box
          unit_of_measurement: ms
    flash:
      name: Flash Taskbar
      description: Whether to flash the taskbar icon.
      default: true
      selector:
        boolean: {}
    ding:
      name: Play Sound
      description: Whether to play a notification sound.
      default: true
      selector:
        boolean: {}
    via_notification:
      name: Send via Notification
      description: Deliver as a non-intrusive Windows notification (Tray/Toast).
      default: true
      selector:
        boolean: {}
    via_dialog:
      name: Send via Dialog
      description: Deliver as a high-visibility Windows MessageBox window.
      default: false
      selector:
        boolean: {}
    classic:
      name: Classic Mode
      description: Use the old-school Windows 95 style MessageBox.
      default: false
      selector:
        boolean: {}
  sequence:
  - action: rest_command.mqttagent_notify
    data:
      payload:
        title: "{{ title }}"
        message: "{{ message }}"
        heading: "{{ heading | default('') }}"
        footer: "{{ footer | default('') }}"
        details: "{{ details | default('') }}"
        checkbox: "{{ checkbox | default('') }}"
        type: "{{ type | default('ok') }}"
        icon: "{{ icon | default('info') }}"
        timeout: "{{ timeout | default(0) }}"
        flash: "{{ flash | default(true) }}"
        ding: "{{ ding | default(true) }}"
        useToast: "{{ via_notification | default(true) }}"
        useMessageBox: "{{ via_dialog | default(false) }}"
        classic: "{{ classic | default(false) }}"
        callback: "{{ callback | default('') }}"
    - action: rest_command.mqttagent_execute
      metadata: {}
      data: {}
      enabled: false
    continue_on_error: true
